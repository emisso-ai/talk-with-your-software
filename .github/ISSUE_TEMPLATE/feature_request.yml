name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I have searched for [existing issues](https://github.com/emisso-ai/talk-with-your-software/issues)
          required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@emisso/talk (engine)"
        - "@emisso/talk-react (widget)"
        - "@emisso/talk-next (adapter)"
        - "New package"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include API examples if possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
