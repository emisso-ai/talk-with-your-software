name: Bug Report
description: Report a bug in @emisso/talk
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I have searched for [existing issues](https://github.com/emisso-ai/talk-with-your-software/issues)
          required: true
        - label: I have read the [README](https://github.com/emisso-ai/talk-with-your-software/blob/main/README.md)
          required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@emisso/talk (engine)"
        - "@emisso/talk-react (widget)"
        - "@emisso/talk-next (adapter)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, code snippet, or link to a reproduction repo.
      placeholder: |
        1. Install @emisso/talk-next
        2. Create route with createTalkRouter(...)
        3. Send a query
        4. See error: ...
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
