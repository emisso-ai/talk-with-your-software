name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@emisso/talk (engine)"
        - "@emisso/talk-react (widget)"
        - "@emisso/talk-next (adapter)"
        - "New package"
