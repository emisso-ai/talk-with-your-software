name: Bug Report
description: Report a bug in @emisso/talk
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the issue.
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@emisso/talk (engine)"
        - "@emisso/talk-react (widget)"
        - "@emisso/talk-next (adapter)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
